<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Par ZombiesHD</title>
  <style>
    :root{--accent:#ff3366}
    html,body{height:100%;margin:0;background:#000;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    .stage{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .center{position:relative;display:flex;align-items:center;justify-content:center;gap:40px;flex-direction:row}
    .par{width:280px;height:auto;filter:drop-shadow(0 8px 20px rgba(0,0,0,.8));animation:pop 1s ease both}
    .face{width:160px;height:160px;object-fit:cover;border-radius:50%;overflow:hidden;border:4px solid rgba(255,255,255,0.06);box-shadow:0 10px 30px rgba(0,0,0,.7),0 0 30px rgba(255,51,102,0.08) inset;transform-origin:center center;animation:float 4s ease-in-out infinite}
    .face.left{animation-delay:0s}
    .face.right{animation-delay:0.6s}
    @keyframes float{0%{transform:translateY(0) rotateZ(-1deg) scale(1)}25%{transform:translateY(-8px) rotateZ(1deg) scale(1.02)}50%{transform:translateY(0) rotateZ(-1deg) scale(1)}75%{transform:translateY(6px) rotateZ(0.5deg) scale(0.98)}100%{transform:translateY(0) rotateZ(-1deg) scale(1)}}
    @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    .label{position:absolute;top:50%;left:50%;transform:translate(-50%,-130%);color:#fff;font-size:28px;letter-spacing:2px;background:rgba(255,255,255,0.02);padding:12px 20px;border-radius:8px;text-transform:uppercase}
    .face::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:0 4px 20px rgba(255,51,102,0.12);opacity:0;transition:opacity .3s}
    .face:hover::after{opacity:1}
    .eye-blink{animation:blink 6s infinite;transform-origin:center center}
    @keyframes blink{0%,95%{transform:scaleY(1)}96%{transform:scaleY(.07)}97%{transform:scaleY(1)}100%{transform:scaleY(1)}}
    @media(max-width:640px){.center{flex-direction:column;gap:18px}.par{width:220px}.face{width:120px;height:120px}.label{font-size:20px}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="center">
      <div style="position:relative">
        <img src="assets/images/angelzombiehd.png" alt="Angel" class="face left eye-blink">
      </div>
      <img src="assets/images/parzombieshd.png" alt="Par ZombiesHD" class="par">
      <div style="position:relative">
        <img src="assets/images/jhonaszombiehd.jpg" alt="Jhonas" class="face right eye-blink">
      </div>
    </div>
    <div class="label">par zombieshd</div>
  </div>
  <script>
    (function(){
      const left=document.querySelector('.face.left');
      const right=document.querySelector('.face.right');
      const center=document.querySelector('.par');
      if(!left||!right||!center) return;
      document.addEventListener('mousemove',e=>{
        const w=window.innerWidth,h=window.innerHeight;
        const x=(e.clientX - w/2)/(w/2);
        const y=(e.clientY - h/2)/(h/2);
        left.style.transform = `translate3d(${x*6}px,${y*-6}px,0) rotate(${x*3}deg)`;
        right.style.transform = `translate3d(${x*-6}px,${y*-6}px,0) rotate(${x*-3}deg)`;
        center.style.transform = `translate3d(${x*4}px,${y*-4}px,0)`;
      });
      document.addEventListener('mouseleave',()=>{left.style.transform='';right.style.transform='';center.style.transform='';});
    })();
  </script>
</body>
</html>
